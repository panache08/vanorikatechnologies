<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="hexGradI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="boltGradI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#93C5FD"/>
    </linearGradient>
    <filter id="glowI">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="#0A2540" rx="16"/>

  <!-- Hexagon (centered 50,50 radius 42) -->
  <polygon
    points="50,8 86.4,29 86.4,71 50,92 13.6,71 13.6,29"
    fill="url(#hexGradI)"
    stroke="rgba(6,182,212,0.7)"
    stroke-width="1.5"
    filter="url(#glowI)"
  />

  <!-- Lightning bolt -->
  <polygon
    points="56,18 38,52 51,52 44,82 70,48 57,48"
    fill="url(#boltGradI)"
  />
</svg>
