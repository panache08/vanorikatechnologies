<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 130" width="580" height="130">
  <defs>
    <linearGradient id="hexGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="boltGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
    <linearGradient id="tagGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="lineGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- White Background -->
  <rect width="580" height="130" fill="#FFFFFF"/>

  <!-- Subtle bg accent -->
  <rect width="580" height="130" fill="url(#hexGradL)" opacity="0.03"/>

  <!-- Hexagon -->
  <polygon
    points="65,17 106,41 106,89 65,113 24,89 24,41"
    fill="url(#hexGradL)"
    stroke="rgba(37,99,235,0.3)"
    stroke-width="1.5"
  />

  <!-- Lightning bolt -->
  <polygon
    points="70,32 52,62 63,62 57,98 83,65 71,65"
    fill="url(#boltGradL)"
  />

  <!-- Company Name: dark on light -->
  <text x="128" y="57"
    font-family="'Segoe UI','Arial',sans-serif"
    font-weight="700" font-size="26" letter-spacing="1"
    fill="#0A2540"
  >PANASHE TECH</text>

  <!-- Solutions gradient -->
  <text x="130" y="76"
    font-family="'Segoe UI','Arial',sans-serif"
    font-weight="400" font-size="13" letter-spacing="5"
    fill="url(#tagGradL)"
  >SOLUTIONS</text>

  <!-- Divider -->
  <line x1="129" y1="86" x2="370" y2="86" stroke="url(#lineGradL)" stroke-width="0.8"/>

  <!-- Location -->
  <text x="130" y="100"
    font-family="'Segoe UI','Arial',sans-serif"
    font-weight="300" font-size="10" letter-spacing="3"
    fill="rgba(100,116,139,0.6)"
  >HARARE  ·  ZIMBABWE</text>
</svg>
