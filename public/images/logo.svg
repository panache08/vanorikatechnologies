<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 130" width="580" height="130">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#93C5FD"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="580" height="130" fill="#0A2540"/>

  <!-- Hexagon icon (centered at 65, 65, radius 48) -->
  <polygon
    points="65,17 106,41 106,89 65,113 24,89 24,41"
    fill="url(#hexGrad)"
    stroke="rgba(6,182,212,0.6)"
    stroke-width="1.5"
    filter="url(#glow)"
  />

  <!-- Lightning bolt inside hex -->
  <polygon
    points="70,32 52,62 63,62 57,98 83,65 71,65"
    fill="url(#boltGrad)"
    filter="url(#boltGlow)"
  />

  <!-- Company Name -->
  <text
    x="128"
    y="57"
    font-family="'Segoe UI', 'Arial', sans-serif"
    font-weight="700"
    font-size="26"
    letter-spacing="1"
    fill="#FFFFFF"
  >PANASHE TECH</text>

  <!-- Solutions -->
  <text
    x="130"
    y="76"
    font-family="'Segoe UI', 'Arial', sans-serif"
    font-weight="400"
    font-size="13"
    letter-spacing="5"
    fill="url(#tagGrad)"
  >SOLUTIONS</text>

  <!-- Divider line -->
  <line x1="129" y1="86" x2="370" y2="86" stroke="url(#lineGrad)" stroke-width="0.8"/>

  <!-- Tagline -->
  <text
    x="130"
    y="100"
    font-family="'Segoe UI', 'Arial', sans-serif"
    font-weight="300"
    font-size="10"
    letter-spacing="3"
    fill="rgba(148,163,184,0.5)"
  >HARARE  ·  ZIMBABWE</text>
</svg>
